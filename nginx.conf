server {
    # 3000 as well as 8080: Coolify's proxy routes to whatever its "Ports
    # Exposes" field says, which defaults to 3000 and can't be read from here.
    # Answering on both means the deploy doesn't depend on that setting.
    listen 3000;
    listen [::]:3000;
    listen 8080;
    listen [::]:8080;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /healthz {
        access_log off;
        return 200 "ok";
    }

    # Vite emits hashed filenames here — safe to cache forever.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The shell must never be cached, or deploys don't take effect
    # until the browser feels like revalidating.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: adapter-static builds with fallback index.html,
    # so every client-side route resolves to the shell.
    location / {
        try_files $uri /index.html;
    }
}
