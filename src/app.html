<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover is what makes env(safe-area-inset-*) resolve on
		     notched phones; without it the dock sits under the home indicator. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />

		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#191824" />

		<!-- iOS ignores the manifest for these. -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Ilana" />
		<meta name="mobile-web-app-capable" content="yes" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
